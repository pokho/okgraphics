<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK Graphics - AI Print Design</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>OK Graphics</h1>
            <p class="subtitle">AI-Powered Print Design & Anime Conversion</p>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="vector">Vector Graphics</button>
            <button class="tab" data-tab="anime">Anime Conversion</button>
        </nav>

        <!-- Vector Generation Tab -->
        <section id="vector-tab" class="tab-content active">
            <form id="vector-form">
                <div class="form-group">
                    <label for="vector-prompt">Prompt</label>
                    <textarea id="vector-prompt" name="prompt" rows="3" required
                        placeholder="Describe the image you want to generate..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="vector-lora">Style</label>
                        <select id="vector-lora" name="lora">
                            <option value="vector_flat">Vector Flat (clean line art)</option>
                            <option value="vector_illustration">Vector Illustration (sticker style)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="vector-seed">Seed (optional)</label>
                        <input type="number" id="vector-seed" name="seed" placeholder="Random">
                    </div>
                </div>

                <details class="advanced">
                    <summary>Advanced Settings</summary>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="vector-width">Width (px)</label>
                            <input type="number" id="vector-width" name="width" value="2400">
                        </div>
                        <div class="form-group">
                            <label for="vector-height">Height (px)</label>
                            <input type="number" id="vector-height" name="height" value="3200">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="vector-steps">Steps</label>
                            <input type="range" id="vector-steps" name="steps" min="20" max="40" value="30">
                            <span class="range-value" id="vector-steps-value">30</span>
                        </div>
                        <div class="form-group">
                            <label for="vector-guidance">Guidance</label>
                            <input type="range" id="vector-guidance" name="guidance" min="5" max="15" step="0.5" value="7.5">
                            <span class="range-value" id="vector-guidance-value">7.5</span>
                        </div>
                    </div>
                </details>

                <button type="submit" class="btn primary">Generate</button>
            </form>
        </section>

        <!-- Anime Conversion Tab -->
        <section id="anime-tab" class="tab-content">
            <form id="anime-form">
                <div class="form-group">
                    <label for="anime-image">Source Image</label>
                    <div class="file-drop" id="anime-drop">
                        <input type="file" id="anime-image" name="image" accept="image/*" required>
                        <div class="file-drop-text">
                            <span>Drop image here or click to browse</span>
                        </div>
                        <img id="anime-preview" class="preview-image" alt="Preview">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="anime-style">Style</label>
                        <select id="anime-style" name="style">
                            <option value="anime_watercolor">Anime Watercolor (Ghibli style)</option>
                            <option value="anime_general">Anime General (pastel style)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="anime-seed">Seed (optional)</label>
                        <input type="number" id="anime-seed" name="seed" placeholder="Random">
                    </div>
                </div>

                <div class="form-group">
                    <label for="anime-prompt">Additional Prompt (optional)</label>
                    <input type="text" id="anime-prompt" name="prompt" placeholder="detailed background, sunset lighting...">
                </div>

                <details class="advanced">
                    <summary>Advanced Settings</summary>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="anime-strength">Transform Strength</label>
                            <input type="range" id="anime-strength" name="strength" min="0.5" max="0.9" step="0.05" value="0.70">
                            <span class="range-value" id="anime-strength-value">0.70</span>
                        </div>
                        <div class="form-group">
                            <label for="anime-steps">Steps</label>
                            <input type="range" id="anime-steps" name="steps" min="25" max="40" value="35">
                            <span class="range-value" id="anime-steps-value">35</span>
                        </div>
                    </div>
                </details>

                <button type="submit" class="btn primary">Convert</button>
            </form>
        </section>

        <!-- Result Section -->
        <section id="result-section" class="hidden">
            <h2>Result</h2>
            <div class="result-container">
                <img id="result-image" alt="Generated image">
                <div class="result-actions">
                    <button id="download-btn" class="btn">Download PNG</button>
                    <button id="new-btn" class="btn secondary">Generate New</button>
                </div>
            </div>
        </section>

        <!-- Loading Overlay -->
        <div id="loading" class="loading hidden">
            <div class="loading-content">
                <div class="spinner"></div>
                <p id="loading-text">Generating...</p>
                <p class="loading-note">First generation loads models (~30s), subsequent generations are faster (~5s)</p>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error" class="error hidden">
            <p id="error-text"></p>
            <button id="error-dismiss" class="btn secondary">Dismiss</button>
        </div>

        <footer>
            <p>Powered by Stable Diffusion XL + LoRA | <a href="/docs">API Docs</a></p>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
